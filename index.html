<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket To Ride Wheel</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <header class="card">
        <h1>Ticket To Ride Map Randomizer</h1>
    </header>

    <section class="card main-wheel-card">
        <div class="wheel-wrapper">
            <div class="pointer"></div>
            <canvas id="wheelCanvas" width="500" height="500"></canvas>
            <button id="spinBtn">SPIN ROUTE</button>
        </div>

        <div class="controls">
            <label for="playersInput">Live Players:</label>
            <input type="number" id="playersInput" min="1" max="4" value="1">
        </div>
    </section>

    <section class="card difficulty-card">
        <div id="difficultyWheelsContainer" class="wheels-container">
            <!-- Difficulty wheels will be injected here -->
        </div>
    </section>

    <section class="card result-card">
        <div id="result"></div>
    </section>

    <section class="card history-card">
        <div id="history">
            <h3>History</h3>
            <ul id="historyList"></ul>
        </div>
    </section>
</div>

<audio id="tickSound" src="sounds/tic.mp3"></audio>
<audio id="winSound" src="sounds/win.mp3"></audio>

<script type="module" src="index.js"></script>
</body>
</html>
