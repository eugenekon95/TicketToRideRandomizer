<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket To Ride Wheel</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <h1>Ticket To Ride Map Randomizer</h1>

    <div class="wheel-wrapper">
        <div class="pointer"></div>
        <canvas id="wheelCanvas" width="500" height="500"></canvas>
        <button id="spinBtn">SPIN ROUTE</button>
    </div>

    <div class="controls">
        <label for="playersInput">Live Players:</label>
        <input type="number" id="playersInput" min="1" max="4" value="1">
    </div>

    <div id="difficultyWheelsContainer" class="wheels-container">
        <!-- Difficulty wheels will be injected here -->
    </div>

    <div id="result"></div>

    <div id="history" class="history-container">
        <h3>History</h3>
        <ul id="historyList"></ul>
    </div>
</div>

<audio id="tickSound" src="sounds/tic.mp3"></audio>
<audio id="winSound" src="sounds/win.mp3"></audio>

<script type="module" src="index.js"></script>
</body>
</html>
